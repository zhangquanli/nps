name: Release

on:
  push:
    branches:
      - master

env:
  NPS_DOCKER_IMAGE: zhangquanli/nps:latest
  NPC_DOCKER_IMAGE: zhangquanli/npc:latest

jobs:
  build_docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build and Push nps Docker Image
        uses: docker/build-push-action@v5
        with:
          file: ./Dockerfile.nps
          context: .
          push: true
          tags: ${{env.NPS_DOCKER_IMAGE}}

      - name: Build and Push npc Docker Image
        uses: docker/build-push-action@v5
        with:
          file: ./Dockerfile.npc
          context: .
          push: true
          tags: ${{env.NPC_DOCKER_IMAGE}}
